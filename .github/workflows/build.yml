name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --noconsole timezone_tool.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: timezone-tool
          path: dist/timezone_tool.exe
